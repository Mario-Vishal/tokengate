<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContextPilot Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}

    [data-theme="dark"]{
      --bg:#0c0d13;--surface:#13151e;--panel:#1a1c27;--border:#252837;
      --text:#e3e6f2;--muted:#5e6378;
      --accent:#7c6dfa;--accent2:rgba(124,109,250,.14);
      --green:#4ade80;--green2:rgba(74,222,128,.12);
      --yellow:#fbbf24;--yellow2:rgba(251,191,36,.12);
      --red:#f87171;--red2:rgba(248,113,113,.12);
      --shadow:0 4px 32px rgba(0,0,0,.55);
    }
    [data-theme="light"]{
      --bg:#f0f2f9;--surface:#fff;--panel:#f5f7fd;--border:#dde0ee;
      --text:#181b2e;--muted:#8891b0;
      --accent:#5c4fe0;--accent2:rgba(92,79,224,.1);
      --green:#16a34a;--green2:rgba(22,163,74,.1);
      --yellow:#d97706;--yellow2:rgba(217,119,6,.1);
      --red:#dc2626;--red2:rgba(220,38,38,.1);
      --shadow:0 4px 24px rgba(0,0,0,.08);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,sans-serif;font-size:14px;
      transition:background .2s,color .2s}
    .app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

    /* topbar */
    .topbar{display:flex;align-items:center;gap:10px;padding:0 20px;height:52px;
      background:var(--surface);border-bottom:1px solid var(--border);
      flex-shrink:0;box-shadow:var(--shadow);z-index:10}
    .brand{font-weight:800;font-size:15px;letter-spacing:-.03em;white-space:nowrap}
    .brand em{color:var(--accent);font-style:normal}
    .spacer{flex:1}
    .pill{display:flex;align-items:center;gap:4px;padding:3px 10px;
      border:1px solid var(--border);border-radius:999px;font-size:12px;
      color:var(--muted);white-space:nowrap;background:var(--panel)}
    .pill b{color:var(--text);font-weight:700}
    .icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);
      background:var(--panel);cursor:pointer;display:flex;align-items:center;
      justify-content:center;font-size:17px;transition:background .15s;color:var(--text)}
    .icon-btn:hover{background:var(--border)}

    /* three-column layout */
    .columns{display:flex;flex:1;overflow:hidden}

    /* sidebar */
    .sidebar{width:252px;flex-shrink:0;display:flex;flex-direction:column;
      background:var(--surface);border-right:1px solid var(--border);overflow:hidden}
    .pane-head{padding:10px 16px 8px;font-size:10px;font-weight:700;letter-spacing:.1em;
      text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);flex-shrink:0}
    .scroll{overflow-y:auto;flex:1}

    .s-row{padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;
      transition:background .12s;border-left:3px solid transparent}
    .s-row:hover{background:var(--panel)}
    .s-row.active{background:var(--accent2);border-left-color:var(--accent)}
    .s-time{font-size:11px;color:var(--muted);margin-bottom:5px}
    .s-meta{display:flex;align-items:center;gap:8px}
    .s-count{font-size:12px;font-weight:600;color:var(--text)}
    .mini-bar{height:3px;border-radius:2px;background:var(--border);margin-top:8px;overflow:hidden}
    .mini-fill{height:100%;border-radius:2px;transition:width .35s}

    /* badges */
    .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;line-height:1.5}
    .bg{background:var(--green2);color:var(--green)}
    .by{background:var(--yellow2);color:var(--yellow)}
    .br{background:var(--red2);color:var(--red)}
    .bm{background:var(--panel);color:var(--muted);border:1px solid var(--border)}

    /* queries column */
    .q-col{width:292px;flex-shrink:0;display:flex;flex-direction:column;
      border-right:1px solid var(--border);background:var(--bg);overflow:hidden}
    .q-chart-area{flex-shrink:0;padding:10px 14px 6px;border-bottom:1px solid var(--border)}
    .q-list{overflow-y:auto;flex:1;padding:10px;display:flex;flex-direction:column;gap:7px}
    .q-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
      padding:11px 13px;cursor:pointer;transition:border-color .15s,box-shadow .15s,background .12s}
    .q-card:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent2)}
    .q-card.active{border-color:var(--accent);background:var(--accent2)}
    .q-text{font-size:12.5px;font-weight:500;margin-bottom:7px;line-height:1.4;
      overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .q-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
    .q-tok{font-size:11px;color:var(--muted)}
    .q-tok b{color:var(--text);font-weight:600}

    /* detail column */
    .d-col{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;min-width:0}
    /* single-root wrapper inside x-if — display:contents so gap/flex pass through */
    .d-cards{display:contents}

    /* card */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:13px;
      padding:18px;box-shadow:var(--shadow)}
    .card-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
      color:var(--muted);margin-bottom:15px}

    /* compare */
    .cmp{display:grid;grid-template-columns:1fr 90px 1fr;gap:12px;align-items:center}
    .cmp-box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
    .cmp-box.hi{border-color:var(--accent)}
    .cmp-lbl{font-size:11px;color:var(--muted);margin-bottom:7px;font-weight:600;letter-spacing:.02em}
    .cmp-val{font-size:26px;font-weight:900;letter-spacing:-.03em;line-height:1}
    .cmp-sub{font-size:11px;color:var(--muted);margin-top:5px}
    .cmp-mid{text-align:center}
    .cmp-pct{font-size:32px;font-weight:900;color:var(--green);letter-spacing:-.04em;line-height:1}
    .cmp-tok{font-size:11px;color:var(--muted);margin-top:5px}

    /* donut */
    .donut-row{display:flex;align-items:center;gap:28px}
    .donut-wrap{position:relative;width:150px;height:150px;flex-shrink:0}
    .donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
    .dc-pct{font-size:24px;font-weight:900;color:var(--green);letter-spacing:-.03em}
    .dc-lab{font-size:10px;color:var(--muted);margin-top:1px}
    .donut-legend{display:flex;flex-direction:column;gap:13px}
    .dl-item{display:flex;align-items:flex-start;gap:10px}
    .dl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
    .dl-val{font-size:14px;font-weight:700}
    .dl-sub{font-size:11px;color:var(--muted);margin-top:1px}

    /* funnel */
    .funnel-canvas{display:block;width:100%}

    /* block table */
    .dt{width:100%;border-collapse:collapse;table-layout:fixed}
    .dt th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.07em;
      text-transform:uppercase;color:var(--muted);padding:6px 8px;border-bottom:1px solid var(--border);
      overflow:hidden;white-space:nowrap}
    .dt td{padding:7px 8px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;
      overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .dt td.wrap{white-space:normal;word-break:break-word}
    .dt tr:last-child td{border-bottom:none}
    .dt tr:hover td{background:var(--panel)}
    .mono{font-family:monospace;font-size:11px}
    .muted{color:var(--muted)}
    .chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700}
    .ci{background:var(--green2);color:var(--green)}
    .cc{background:var(--yellow2);color:var(--yellow)}
    .cd{background:var(--red2);color:var(--red)}

    /* empty / loader */
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:10px;color:var(--muted);padding:40px 24px;text-align:center}
    .empty h2{font-size:15px;color:var(--text);font-weight:600;margin-top:8px}
    .empty p{font-size:13px;line-height:1.55;max-width:280px}
    .loader{color:var(--muted);padding:32px;text-align:center;font-size:13px}

    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
  </style>
</head>
<body>
<div class="app" x-data="dashboard()" x-init="init()" x-cloak>

  <!-- topbar -->
  <header class="topbar">
    <div class="brand">Context<em>Pilot</em></div>
    <template x-if="stats && stats.total_queries > 0">
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <div class="pill"><b x-text="stats.total_sessions"></b>&nbsp;sessions</div>
        <div class="pill"><b x-text="stats.total_queries"></b>&nbsp;queries</div>
        <div class="pill">avg&nbsp;<b x-text="pct(stats.avg_saved_pct)"></b>&nbsp;saved</div>
        <div class="pill"><b x-text="fmtK(stats.total_saved)"></b>&nbsp;tokens saved total</div>
      </div>
    </template>
    <div class="spacer"></div>
    <button class="icon-btn" @click="toggleTheme()"
            :title="theme==='dark'?'Light mode':'Dark mode'"
            x-text="theme==='dark'?'☀️':'🌙'"></button>
  </header>

  <div class="columns">

    <!-- sessions sidebar -->
    <aside class="sidebar">
      <div class="pane-head">Sessions&nbsp;(<span x-text="sessions.length"></span>)</div>
      <div class="scroll">
        <template x-if="loadingSessions"><div class="loader">Loading…</div></template>
        <template x-if="!loadingSessions && sessions.length===0">
          <div class="empty" style="padding:28px 14px">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".35"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <h2>No sessions yet</h2>
            <p>Call <code style="font-size:11px;background:var(--panel);padding:1px 4px;border-radius:3px">store.record()</code> after each <code style="font-size:11px;background:var(--panel);padding:1px 4px;border-radius:3px">optimize()</code>.</p>
          </div>
        </template>
        <template x-for="s in sessions" :key="s.session_id">
          <div class="s-row" :class="{active:activeSession===s.session_id}" @click="selectSession(s)">
            <div class="s-time" x-text="fmtTime(s.last_seen)"></div>
            <div class="s-meta">
              <span class="s-count" x-text="s.query_count+(s.query_count===1?' query':' queries')"></span>
              <span class="badge" :class="savedBadge(s.avg_saved_pct)" x-text="pct(s.avg_saved_pct)+' saved'"></span>
            </div>
            <div class="mini-bar">
              <div class="mini-fill" :style="`width:${Math.min(100,s.avg_saved_pct)}%;background:${savedColor(s.avg_saved_pct)}`"></div>
            </div>
          </div>
        </template>
      </div>
    </aside>

    <!-- queries column -->
    <div class="q-col">
      <div class="pane-head" x-text="activeSession?'Queries ('+queries.length+')':'Queries'"></div>
      <div class="q-chart-area" x-show="queries.length>1" style="display:none">
        <canvas id="session-chart" height="55"></canvas>
      </div>
      <div class="q-list">
        <template x-if="!activeSession">
          <div class="empty"><p>Select a session on the left.</p></div>
        </template>
        <template x-if="loadingQueries"><div class="loader">Loading…</div></template>
        <template x-for="q in queries" :key="q.query_id">
          <div class="q-card" :class="{active:activeQueryId===q.query_id}" @click="selectQuery(q)">
            <div class="q-text" x-text="q.query_text"></div>
            <div class="q-row">
              <span class="q-tok"><b x-text="fmtK(q.candidate_tokens??0)"></b>&thinsp;→&thinsp;<b x-text="fmtK(q.final_tokens??0)"></b> tok</span>
              <span class="badge" :class="savedBadge(q.saved_pct)" x-text="pct(q.saved_pct??0)"></span>
              <template x-if="q.strategy"><span class="badge bm" x-text="q.strategy"></span></template>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- detail column -->
    <div class="d-col">

      <template x-if="!activeQueryId">
        <div class="empty" style="flex:1;min-height:300px">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" opacity=".25"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <h2>Select a query</h2>
          <p>Pick a session then a query to see the full optimization breakdown.</p>
        </div>
      </template>

      <template x-if="loadingDetail"><div class="loader">Loading…</div></template>

      <!-- NOTE: x-if requires exactly ONE root element — all detail cards live inside .d-cards -->
      <template x-if="detail">
        <div class="d-cards">

          <!-- 1. raw vs optimized -->
          <div class="card">
            <div class="card-title">Raw Context vs ContextPilot Output</div>
            <div class="cmp">
              <div class="cmp-box">
                <div class="cmp-lbl">Without ContextPilot</div>
                <div class="cmp-val" x-text="fmtK(detail.audit.total_candidate_tokens??0)"></div>
                <div class="cmp-sub">tokens · <span x-text="detail.audit.total_candidate_blocks??0"></span> blocks</div>
              </div>
              <div class="cmp-mid">
                <div class="cmp-pct" x-text="pct(detail.audit.tokens_saved_percent??0)"></div>
                <div class="cmp-tok" x-text="fmtK(detail.audit.tokens_saved??0)+' saved'"></div>
              </div>
              <div class="cmp-box hi">
                <div class="cmp-lbl" style="color:var(--accent)">With ContextPilot</div>
                <div class="cmp-val" style="color:var(--accent)" x-text="fmtK(detail.audit.final_prompt_tokens??0)"></div>
                <div class="cmp-sub">
                  <span style="color:var(--green)" x-text="detail.audit.included_count??0"></span> kept ·
                  <span style="color:var(--yellow)" x-text="detail.audit.compressed_count??0"></span> compressed ·
                  <span style="color:var(--red)" x-text="detail.audit.dropped_count??0"></span> dropped
                </div>
              </div>
            </div>
          </div>

          <!-- 2. token savings donut -->
          <div class="card">
            <div class="card-title">Token Savings</div>
            <div class="donut-row">
              <div class="donut-wrap">
                <canvas id="donut-canvas" width="150" height="150"></canvas>
                <div class="donut-center">
                  <div class="dc-pct" x-text="pct(detail.audit.tokens_saved_percent??0)"></div>
                  <div class="dc-lab">saved</div>
                </div>
              </div>
              <div class="donut-legend">
                <div class="dl-item">
                  <div class="dl-dot" style="background:var(--accent)"></div>
                  <div>
                    <div class="dl-val" x-text="fmtK(detail.audit.final_prompt_tokens??0)+' tok'"></div>
                    <div class="dl-sub">sent to the LLM</div>
                  </div>
                </div>
                <div class="dl-item">
                  <div class="dl-dot" style="background:var(--green)"></div>
                  <div>
                    <div class="dl-val" x-text="fmtK(detail.audit.tokens_saved??0)+' tok'"></div>
                    <div class="dl-sub">saved by ContextPilot</div>
                  </div>
                </div>
                <template x-if="detail.config">
                  <div class="dl-item">
                    <div class="dl-dot" style="background:var(--border)"></div>
                    <div>
                      <div class="dl-val" style="font-size:13px" x-text="detail.config.strategy??'—'"></div>
                      <div class="dl-sub" x-text="'budget '+fmtK(detail.config.max_prompt_tokens)+' tok'"></div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- 3. pipeline funnel (canvas) -->
          <div class="card" x-show="detail.audit.stages && detail.audit.stages.length">
            <div class="card-title">Pipeline Funnel</div>
            <canvas id="funnel-canvas" class="funnel-canvas"></canvas>
          </div>

          <!-- 4. block decisions -->
          <div class="card" x-show="detail.audit.decisions && detail.audit.decisions.length">
            <div class="card-title">Block Decisions (<span x-text="(detail.audit.decisions||[]).length"></span>)</div>
            <table class="dt">
              <colgroup>
                <col style="width:86px">
                <col style="width:168px">
                <col style="width:82px">
                <col style="width:58px">
                <col style="width:58px">
                <col>
              </colgroup>
              <thead>
                <tr><th>Decision</th><th>Source</th><th>Tokens</th><th>Score</th><th>Rerank</th><th>Reason</th></tr>
              </thead>
              <template x-for="d in (detail.audit.decisions||[])" :key="d.block_id">
                <tbody>
                  <!-- main row -->
                  <tr style="cursor:pointer" @click="d._open=!d._open">
                    <td><span class="chip" :class="d.decision==='included'?'ci':d.decision==='compressed'?'cc':'cd'" x-text="d.decision"></span></td>
                    <td :title="(detail.audit.block_files||{})[d.block_id] || d.block_id">
                      <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                           x-text="baseName((detail.audit.block_files||{})[d.block_id]) || d.source_id || d.block_id"></div>
                      <div class="muted" style="font-size:10px;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                           x-text="d.block_id"></div>
                    </td>
                    <td class="mono">
                      <span x-text="d.original_tokens"></span>
                      <template x-if="d.final_tokens!==d.original_tokens"><span class="muted"> → <span x-text="d.final_tokens"></span></span></template>
                    </td>
                    <td class="mono" x-text="d.score!=null?d.score.toFixed(3):'—'"></td>
                    <td class="mono" x-text="d.rerank_score!=null?d.rerank_score.toFixed(3):'—'"></td>
                    <td class="muted wrap" style="font-size:11px" x-text="d.reason"></td>
                  </tr>
                  <!-- expandable content preview -->
                  <tr x-show="d._open && d.content_preview" style="display:none">
                    <td colspan="6" style="padding:0">
                      <div style="margin:0 8px 10px;padding:10px 13px;background:var(--panel);border-radius:8px;
                                  font-size:11.5px;line-height:1.6;font-family:monospace;white-space:pre-wrap;
                                  color:var(--text);border:1px solid var(--border)"
                           x-text="d.content_preview"></div>
                    </td>
                  </tr>
                </tbody>
              </template>
            </table>
            <div style="margin-top:10px;font-size:11px;color:var(--muted)">Click a row to expand its content preview.</div>
          </div>

          <!-- 5. final prompt -->
          <div class="card" x-show="detail.audit.final_prompt">
            <div class="card-title">Final Prompt sent to LLM</div>
            <div style="font-size:11.5px;line-height:1.7;font-family:monospace;white-space:pre-wrap;
                        background:var(--panel);padding:14px;border-radius:8px;
                        border:1px solid var(--border);max-height:400px;overflow-y:auto;color:var(--text)"
                 x-text="detail.audit.final_prompt"></div>
          </div>

        </div><!-- /.d-cards -->
      </template>

    </div><!-- /d-col -->
  </div><!-- /columns -->
</div><!-- /app -->

<script>
function dashboard() {
  return {
    theme: localStorage.getItem('cp-theme') || 'dark',
    stats: null, sessions: [], queries: [], detail: null,
    activeSession: null, activeQueryId: null,
    loadingSessions: false, loadingQueries: false, loadingDetail: false,
    _donutChart: null, _sessionChart: null,

    async init() {
      document.documentElement.setAttribute('data-theme', this.theme);
      this.loadingSessions = true;
      try {
        const [stats, sessions] = await Promise.all([
          fetch('/api/stats').then(r => r.json()),
          fetch('/api/sessions').then(r => r.json()),
        ]);
        this.stats = stats;
        this.sessions = sessions;
      } finally { this.loadingSessions = false; }
    },

    toggleTheme() {
      this.theme = this.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', this.theme);
      localStorage.setItem('cp-theme', this.theme);
      if (this.detail) this.$nextTick(() => { this._renderDonut(); this._renderFunnel(); });
      if (this.queries.length > 1) this.$nextTick(() => this._renderSessionChart());
    },

    async selectSession(s) {
      if (this.activeSession === s.session_id) return;
      this.activeSession = s.session_id;
      this.queries = []; this.detail = null; this.activeQueryId = null;
      this.loadingQueries = true;
      try {
        this.queries = await fetch(`/api/sessions/${s.session_id}`).then(r => r.json());
        if (this.queries.length > 1) this.$nextTick(() => this._renderSessionChart());
      } finally { this.loadingQueries = false; }
    },

    async selectQuery(q) {
      if (this.activeQueryId === q.query_id) return;
      this.activeQueryId = q.query_id;
      this.detail = null;
      this.loadingDetail = true;
      try {
        this.detail = await fetch(`/api/queries/${q.query_id}`).then(r => r.json());
        this.$nextTick(() => { this._renderDonut(); this._renderFunnel(); });
      } finally { this.loadingDetail = false; }
    },

    // ── helpers ──────────────────────────────────────────────────────
    _css(p) { return getComputedStyle(document.documentElement).getPropertyValue(p).trim(); },

    // hex "#rrggbb" → "rgba(r,g,b,a)"
    _rgba(hex, a) {
      const h = hex.replace('#','');
      const r = parseInt(h.slice(0,2),16);
      const g = parseInt(h.slice(2,4),16);
      const b = parseInt(h.slice(4,6),16);
      return `rgba(${r},${g},${b},${a})`;
    },

    // ── donut chart ───────────────────────────────────────────────────
    _renderDonut() {
      if (this._donutChart) { this._donutChart.destroy(); this._donutChart = null; }
      const canvas = document.getElementById('donut-canvas');
      if (!canvas || !this.detail || typeof Chart === 'undefined') return;
      const sent  = this.detail.audit.final_prompt_tokens ?? 0;
      const saved = this.detail.audit.tokens_saved ?? 0;
      this._donutChart = new Chart(canvas, {
        type: 'doughnut',
        data: {
          datasets: [{
            data: [sent, saved],
            backgroundColor: [this._css('--accent'), this._css('--green')],
            borderWidth: 0, hoverOffset: 4,
          }],
        },
        options: {
          cutout: '70%',
          animation: { duration: 500, easing: 'easeOutQuart' },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ctx.dataIndex === 0
                  ? ` ${ctx.raw.toLocaleString()} tok sent to LLM`
                  : ` ${ctx.raw.toLocaleString()} tok saved`,
              },
              backgroundColor: 'rgba(0,0,0,.85)', padding: 10,
            },
          },
        },
      });
    },

    // ── funnel chart (Canvas 2D, no library) ─────────────────────────
    _renderFunnel() {
      const canvas = document.getElementById('funnel-canvas');
      if (!canvas || !this.detail?.audit?.stages?.length) return;

      const stages   = this.detail.audit.stages;
      const accent   = this._css('--accent');
      const muted    = this._css('--muted');
      const red      = this._css('--red');
      const textClr  = this._css('--text');
      const panelClr = this._css('--panel');

      const ROW_H  = 48;
      const dpr    = window.devicePixelRatio || 1;
      const W      = canvas.parentElement.clientWidth || 560;
      const H      = stages.length * ROW_H;

      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';

      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, W, H);

      // layout
      const LABEL_W = 112;
      const STAT_W  = 140;
      const BAR_W   = W - LABEL_W - STAT_W - 24;
      const BAR_X   = LABEL_W + 10;
      const BAR_CX  = BAR_X + BAR_W / 2;
      const STAT_X  = BAR_X + BAR_W + 12;

      const firstIn = stages[0].blocks_in || 1;

      stages.forEach((s, i) => {
        const prevOut = i === 0 ? s.blocks_in : stages[i - 1].blocks_out;
        const topW    = (prevOut / firstIn) * BAR_W;
        const botW    = (s.blocks_out / firstIn) * BAR_W;
        const y1      = i * ROW_H;
        const y2      = y1 + ROW_H - 2;      // 2px gap between rows
        const cy      = (y1 + y2) / 2;
        const dropped = s.blocks_in - s.blocks_out;
        const pctThru = Math.round((s.blocks_out / firstIn) * 100);

        // gradient fill
        const grad = ctx.createLinearGradient(0, y1, 0, y2);
        grad.addColorStop(0, this._rgba(accent, 0.92));
        grad.addColorStop(1, this._rgba(accent, 0.68));

        // trapezoid
        ctx.beginPath();
        ctx.moveTo(BAR_CX - topW / 2, y1);
        ctx.lineTo(BAR_CX + topW / 2, y1);
        ctx.lineTo(BAR_CX + botW / 2, y2);
        ctx.lineTo(BAR_CX - botW / 2, y2);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // dropped side-wedge (right, red tint)
        if (dropped > 0 && topW > botW + 4) {
          const wedgeGrad = ctx.createLinearGradient(0, y1, 0, y2);
          wedgeGrad.addColorStop(0, this._rgba(red, 0.22));
          wedgeGrad.addColorStop(1, this._rgba(red, 0.08));
          ctx.beginPath();
          ctx.moveTo(BAR_CX + botW / 2, y2);
          ctx.lineTo(BAR_CX + topW / 2, y1);
          ctx.lineTo(BAR_CX + BAR_W / 2, y1);
          ctx.lineTo(BAR_CX + BAR_W / 2, y2);
          ctx.closePath();
          ctx.fillStyle = wedgeGrad;
          ctx.fill();
        }

        // separator line between rows
        if (i < stages.length - 1) {
          ctx.beginPath();
          ctx.moveTo(BAR_CX - Math.max(topW, botW) / 2, y2 + 1);
          ctx.lineTo(BAR_CX + Math.max(topW, botW) / 2, y2 + 1);
          ctx.strokeStyle = 'rgba(0,0,0,0.15)';
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        // stage label (left, right-aligned)
        ctx.fillStyle = muted;
        ctx.font = `11px ui-monospace,monospace`;
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(s.stage, BAR_X - 6, cy);

        // text inside bar
        const minW = Math.min(topW, botW);
        if (minW > 80) {
          ctx.fillStyle = 'rgba(255,255,255,0.92)';
          ctx.font = `bold 12px system-ui`;
          ctx.textAlign = 'center';
          ctx.fillText(`${s.blocks_out} / ${s.blocks_in} blocks`, BAR_CX, cy - 6);
          ctx.fillStyle = 'rgba(255,255,255,0.65)';
          ctx.font = `10px system-ui`;
          ctx.fillText(`${pctThru}% of input`, BAR_CX, cy + 9);
        } else if (minW > 32) {
          ctx.fillStyle = 'rgba(255,255,255,0.92)';
          ctx.font = `bold 11px system-ui`;
          ctx.textAlign = 'center';
          ctx.fillText(`${s.blocks_out}`, BAR_CX, cy);
        }

        // right: dropped count + duration
        ctx.textAlign = 'left';
        if (dropped > 0) {
          ctx.fillStyle = red;
          ctx.font = `bold 11px system-ui`;
          ctx.fillText(`−${dropped} dropped`, STAT_X, cy - 6);
        } else {
          ctx.fillStyle = muted;
          ctx.font = `10px system-ui`;
          ctx.fillText('all passed', STAT_X, cy - 6);
        }
        ctx.fillStyle = muted;
        ctx.font = `10px system-ui`;
        ctx.fillText(`${s.duration_ms} ms`, STAT_X, cy + 9);
      });
    },

    // ── session bar chart ─────────────────────────────────────────────
    _renderSessionChart() {
      if (this._sessionChart) { this._sessionChart.destroy(); this._sessionChart = null; }
      const canvas = document.getElementById('session-chart');
      if (!canvas || this.queries.length < 2 || typeof Chart === 'undefined') return;
      const accent = this._css('--accent');
      const muted  = this._css('--muted');
      this._sessionChart = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: this.queries.map((_, i) => 'Q' + (i + 1)),
          datasets: [{
            data: this.queries.map(q => Math.round(q.saved_pct ?? 0)),
            backgroundColor: accent, borderRadius: 4, borderSkipped: false,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          animation: { duration: 300 },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ` ${ctx.raw}% saved`,
                title: ctx => (this.queries[ctx[0].dataIndex]?.query_text ?? '').slice(0, 50) + '…',
              },
              backgroundColor: 'rgba(0,0,0,.85)', padding: 10,
            },
          },
          scales: {
            x: { grid:{display:false}, ticks:{color:muted,font:{size:10}}, border:{display:false} },
            y: { display:false, min:0, max:100 },
          },
        },
      });
    },

    // ── formatters ───────────────────────────────────────────────────
    pct(v) { return v != null ? Math.round(v) + '%' : '—'; },
    fmtK(n) {
      if (!n) return '0';
      return n >= 1000 ? (n / 1000).toFixed(1) + 'K' : String(Math.round(n));
    },
    fmtTime(ts) {
      if (!ts) return '';
      const d = new Date(ts * 1000);
      return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' })
        + ' · ' + d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
    },
    savedColor(p) { return p>=50?'var(--green)':p>=20?'var(--yellow)':'var(--red)'; },
    savedBadge(p) { return p==null?'bm':p>=50?'bg':p>=20?'by':'br'; },
    baseName(p) { return p ? p.replace(/\\/g,'/').replace(/\/$/, '').split('/').pop() : ''; },
  };
}
</script>
