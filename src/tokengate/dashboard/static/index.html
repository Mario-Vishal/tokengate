<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TokenGate Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='12' fill='%236366f1'/%3E%3Crect x='13' y='12' width='5' height='24' rx='2.5' fill='white'/%3E%3Crect x='30' y='12' width='5' height='24' rx='2.5' fill='white'/%3E%3Crect x='20.5' y='20.5' width='7' height='7' rx='2' fill='white' transform='rotate(45 24 24)'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}

    [data-theme="light"]{
      --bg:#f5f6fa;--surface:#ffffff;--panel:#f1f3f9;--border:#e4e7f0;
      --text:#161a26;--muted:#697088;
      --accent:#4f46e5;--accent2:rgba(79,70,229,.08);--accent-soft:rgba(79,70,229,.06);
      --green:#15a34a;--green2:rgba(21,163,74,.11);
      --yellow:#d97706;--yellow2:rgba(217,119,6,.11);
      --red:#dc2626;--red2:rgba(220,38,38,.1);
      --shadow:0 1px 2px rgba(16,24,40,.04),0 4px 16px rgba(16,24,40,.05);
      --shadow-sm:0 1px 2px rgba(16,24,40,.06);
    }
    [data-theme="dark"]{
      --bg:#0e1016;--surface:#161a24;--panel:#1c2130;--border:#272d3d;
      --text:#e7e9f3;--muted:#8a92a8;
      --accent:#6366f1;--accent2:rgba(99,102,241,.18);--accent-soft:rgba(99,102,241,.1);
      --green:#34d399;--green2:rgba(52,211,153,.14);
      --yellow:#fbbf24;--yellow2:rgba(251,191,36,.14);
      --red:#f87171;--red2:rgba(248,113,113,.14);
      --shadow:0 4px 28px rgba(0,0,0,.45);
      --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--text);
      font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;font-size:16px;
      -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
      transition:background .2s,color .2s}
    .app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

    /* topbar */
    .topbar{display:flex;align-items:center;gap:14px;padding:0 22px;height:60px;
      background:var(--surface);border-bottom:1px solid var(--border);
      flex-shrink:0;box-shadow:var(--shadow-sm);z-index:10}
    .brand{display:flex;align-items:center;gap:11px;white-space:nowrap}
    .logo{width:34px;height:34px;border-radius:9px;flex-shrink:0;box-shadow:var(--shadow-sm)}
    .brand-name{font-weight:800;font-size:19px;letter-spacing:-.025em}
    .brand-name em{color:var(--accent);font-style:normal}
    .brand-sub{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.01em;
      padding-left:11px;margin-left:1px;border-left:1px solid var(--border)}
    .spacer{flex:1}
    .pill{display:flex;align-items:center;gap:5px;padding:5px 13px;
      border:1px solid var(--border);border-radius:999px;font-size:13.5px;
      color:var(--muted);white-space:nowrap;background:var(--panel);font-weight:500}
    .pill b{color:var(--text);font-weight:700}
    .icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);
      background:var(--panel);cursor:pointer;display:flex;align-items:center;
      justify-content:center;transition:background .15s,border-color .15s;color:var(--text)}
    .icon-btn:hover{background:var(--border)}
    .icon-btn svg{width:19px;height:19px}

    /* three-column layout */
    .columns{display:flex;flex:1;overflow:hidden}

    /* sidebar */
    .sidebar{width:280px;flex-shrink:0;display:flex;flex-direction:column;
      background:var(--surface);border-right:1px solid var(--border);overflow:hidden}
    .pane-head{padding:14px 18px 11px;font-size:11.5px;font-weight:700;letter-spacing:.09em;
      text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);flex-shrink:0}
    .scroll{overflow-y:auto;flex:1}

    .s-row{padding:13px 18px;border-bottom:1px solid var(--border);cursor:pointer;
      transition:background .12s;border-left:3px solid transparent}
    .s-row:hover{background:var(--panel)}
    .s-row.active{background:var(--accent2);border-left-color:var(--accent)}
    .s-title{font-size:14.5px;font-weight:650;line-height:1.35;color:var(--text);
      margin-bottom:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;
      -webkit-box-orient:vertical}
    .s-meta{display:flex;align-items:center;gap:8px;margin-bottom:7px}
    .s-time{font-size:12px;color:var(--muted);font-weight:500}
    .s-sub{display:flex;align-items:center;gap:7px;margin-bottom:9px}
    .s-count{font-size:12.5px;color:var(--muted);font-weight:500}
    .s-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;
      background:var(--accent-soft);color:var(--accent);max-width:120px;overflow:hidden;
      text-overflow:ellipsis;white-space:nowrap}
    .mini-bar{height:4px;border-radius:3px;background:var(--border);overflow:hidden}
    .mini-fill{height:100%;border-radius:3px;transition:width .35s}

    /* badges */
    .badge{font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:999px;line-height:1.5;white-space:nowrap}
    .bg{background:var(--green2);color:var(--green)}
    .by{background:var(--yellow2);color:var(--yellow)}
    .br{background:var(--red2);color:var(--red)}
    .bm{background:var(--panel);color:var(--muted);border:1px solid var(--border)}

    /* queries column */
    .q-col{width:312px;flex-shrink:0;display:flex;flex-direction:column;
      border-right:1px solid var(--border);background:var(--bg);overflow:hidden}
    .q-chart-area{flex-shrink:0;padding:12px 16px 8px;border-bottom:1px solid var(--border)}
    .q-list{overflow-y:auto;flex:1;padding:12px;display:flex;flex-direction:column;gap:9px}
    .q-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;
      padding:13px 15px;cursor:pointer;transition:border-color .15s,box-shadow .15s,background .12s}
    .q-card:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent2)}
    .q-card.active{border-color:var(--accent);background:var(--accent2)}
    .q-text{font-size:14px;font-weight:550;margin-bottom:9px;line-height:1.45;
      overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .q-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .q-tok{font-size:12.5px;color:var(--muted)}
    .q-tok b{color:var(--text);font-weight:650}

    /* detail column */
    .d-col{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:16px;min-width:0}
    .d-cards{display:contents}

    /* card */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:15px;
      padding:22px;box-shadow:var(--shadow)}
    .card-title{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
      color:var(--muted);margin-bottom:18px}

    /* compare */
    .cmp{display:grid;grid-template-columns:1fr 100px 1fr;gap:14px;align-items:center}
    .cmp-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center}
    .cmp-box.hi{border-color:var(--accent)}
    .cmp-lbl{font-size:12px;color:var(--muted);margin-bottom:9px;font-weight:600;letter-spacing:.01em}
    .cmp-val{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1}
    .cmp-sub{font-size:12px;color:var(--muted);margin-top:7px}
    .cmp-mid{text-align:center}
    .cmp-pct{font-size:36px;font-weight:800;color:var(--green);letter-spacing:-.04em;line-height:1}
    .cmp-tok{font-size:12px;color:var(--muted);margin-top:6px}

    /* donut */
    .donut-row{display:flex;align-items:center;gap:34px}
    .donut-wrap{position:relative;width:160px;height:160px;flex-shrink:0}
    .donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
    .dc-pct{font-size:27px;font-weight:800;color:var(--green);letter-spacing:-.03em}
    .dc-lab{font-size:11px;color:var(--muted);margin-top:2px}
    .donut-legend{display:flex;flex-direction:column;gap:15px}
    .dl-item{display:flex;align-items:flex-start;gap:11px}
    .dl-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:4px}
    .dl-val{font-size:15px;font-weight:700}
    .dl-sub{font-size:12px;color:var(--muted);margin-top:2px}

    /* funnel container — height set via Alpine :style */
    #funnel-canvas{display:block;width:100%;height:100%}

    /* block table */
    .dt{width:100%;border-collapse:collapse;table-layout:fixed}
    .dt th{text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;
      text-transform:uppercase;color:var(--muted);padding:9px 10px;border-bottom:1px solid var(--border);
      overflow:hidden;white-space:nowrap}
    .dt td{padding:10px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle;
      overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .dt td.wrap{white-space:normal;word-break:break-word}
    .dt tr:last-child td{border-bottom:none}
    .dt tr:hover td{background:var(--panel)}
    .mono{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12.5px}
    .muted{color:var(--muted)}
    .chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700}
    .ci{background:var(--green2);color:var(--green)}
    .cc{background:var(--yellow2);color:var(--yellow)}
    .cd{background:var(--red2);color:var(--red)}

    /* empty / loader */
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:11px;color:var(--muted);padding:44px 26px;text-align:center}
    .empty h2{font-size:17px;color:var(--text);font-weight:650;margin-top:8px}
    .empty p{font-size:14.5px;line-height:1.55;max-width:300px}
    .loader{color:var(--muted);padding:34px;text-align:center;font-size:14.5px}

    ::-webkit-scrollbar{width:7px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
    ::-webkit-scrollbar-thumb:hover{background:var(--muted)}
  </style>
</head>
<body>
<div class="app" x-data="dashboard()" x-init="init()" x-cloak>

  <!-- topbar -->
  <header class="topbar">
    <div class="brand">
      <svg class="logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="tg-logo" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/>
          </linearGradient>
        </defs>
        <rect width="48" height="48" rx="12" fill="url(#tg-logo)"/>
        <rect x="13" y="12" width="5" height="24" rx="2.5" fill="#fff"/>
        <rect x="30" y="12" width="5" height="24" rx="2.5" fill="#fff"/>
        <rect x="20.5" y="20.5" width="7" height="7" rx="2" fill="#fff" transform="rotate(45 24 24)"/>
      </svg>
      <div class="brand-name">Token<em>Gate</em></div>
      <div class="brand-sub">Audit Dashboard</div>
    </div>
    <template x-if="stats && stats.total_queries > 0">
      <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-left:6px">
        <div class="pill"><b x-text="stats.total_sessions"></b>&nbsp;sessions</div>
        <div class="pill"><b x-text="stats.total_queries"></b>&nbsp;queries</div>
        <div class="pill">avg&nbsp;<b x-text="pct(stats.avg_saved_pct)"></b>&nbsp;saved</div>
        <div class="pill"><b x-text="fmtK(stats.total_saved)"></b>&nbsp;tokens saved total</div>
      </div>
    </template>
    <div class="spacer"></div>
    <button class="icon-btn" @click="toggleTheme()"
            :title="theme==='dark'?'Switch to light mode':'Switch to dark mode'" aria-label="Toggle theme">
      <!-- sun (shown in dark mode → click for light) -->
      <svg x-show="theme==='dark'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4.2"/>
        <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
      </svg>
      <!-- moon (shown in light mode → click for dark) -->
      <svg x-show="theme==='light'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
      </svg>
    </button>
  </header>

  <div class="columns">

    <!-- sessions sidebar -->
    <aside class="sidebar">
      <div class="pane-head">Sessions&nbsp;(<span x-text="sessions.length"></span>)</div>
      <div class="scroll">
        <template x-if="loadingSessions"><div class="loader">Loading…</div></template>
        <template x-if="!loadingSessions && sessions.length===0">
          <div class="empty" style="padding:30px 16px">
            <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".35"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <h2>No sessions yet</h2>
            <p>Call <code style="font-size:12px;background:var(--panel);padding:2px 5px;border-radius:4px">store.record(..., label="my-app")</code> after each <code style="font-size:12px;background:var(--panel);padding:2px 5px;border-radius:4px">optimize()</code>.</p>
          </div>
        </template>
        <template x-for="s in sessions" :key="s.session_id">
          <div class="s-row" :class="{active:activeSession===s.session_id}" @click="selectSession(s)">
            <div class="s-title" x-text="sessionTitle(s)" :title="sessionTitle(s)"></div>
            <div class="s-meta">
              <span class="s-time" x-text="fmtTime(s.last_seen)"></span>
              <span class="badge" :class="savedBadge(s.avg_saved_pct)" x-text="pct(s.avg_saved_pct)+' saved'"></span>
            </div>
            <div class="s-sub">
              <span class="s-count" x-text="s.query_count+(s.query_count===1?' query':' queries')"></span>
              <template x-if="s.label"><span class="s-tag" x-text="s.label" :title="s.label"></span></template>
            </div>
            <div class="mini-bar">
              <div class="mini-fill" :style="`width:${Math.min(100,s.avg_saved_pct)}%;background:${savedColor(s.avg_saved_pct)}`"></div>
            </div>
          </div>
        </template>
      </div>
    </aside>

    <!-- queries column -->
    <div class="q-col">
      <div class="pane-head" x-text="activeSession?'Queries ('+queries.length+')':'Queries'"></div>
      <div class="q-chart-area" x-show="queries.length>1" style="display:none">
        <canvas id="session-chart" height="55"></canvas>
      </div>
      <div class="q-list">
        <template x-if="!activeSession">
          <div class="empty"><p>Select a session on the left.</p></div>
        </template>
        <template x-if="loadingQueries"><div class="loader">Loading…</div></template>
        <template x-for="q in queries" :key="q.query_id">
          <div class="q-card" :class="{active:activeQueryId===q.query_id}" @click="selectQuery(q)">
            <div class="q-text" x-text="q.query_text"></div>
            <div class="q-row">
              <span class="q-tok"><b x-text="fmtK(q.candidate_tokens??0)"></b>&thinsp;→&thinsp;<b x-text="fmtK(q.final_tokens??0)"></b> tok</span>
              <span class="badge" :class="savedBadge(q.saved_pct)" x-text="pct(q.saved_pct??0)"></span>
              <template x-if="q.strategy"><span class="badge bm" x-text="q.strategy"></span></template>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- detail column -->
    <div class="d-col">

      <template x-if="!activeQueryId">
        <div class="empty" style="flex:1;min-height:300px">
          <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" opacity=".25"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <h2>Select a query</h2>
          <p>Pick a session then a query to see the full optimization breakdown.</p>
        </div>
      </template>

      <template x-if="loadingDetail"><div class="loader">Loading…</div></template>

      <!-- NOTE: x-if requires exactly ONE root element — all detail cards live inside .d-cards -->
      <template x-if="detail">
        <div class="d-cards">

          <!-- 1. raw vs optimized -->
          <div class="card">
            <div class="card-title">Raw Context vs TokenGate Output</div>
            <div class="cmp">
              <div class="cmp-box">
                <div class="cmp-lbl">Without TokenGate</div>
                <div class="cmp-val" x-text="fmtK(detail.audit.total_candidate_tokens??0)"></div>
                <div class="cmp-sub">tokens · <span x-text="detail.audit.total_candidate_blocks??0"></span> blocks</div>
              </div>
              <div class="cmp-mid">
                <div class="cmp-pct" x-text="pct(detail.audit.tokens_saved_percent??0)"></div>
                <div class="cmp-tok" x-text="fmtK(detail.audit.tokens_saved??0)+' saved'"></div>
              </div>
              <div class="cmp-box hi">
                <div class="cmp-lbl" style="color:var(--accent)">With TokenGate</div>
                <div class="cmp-val" style="color:var(--accent)" x-text="fmtK(detail.audit.final_prompt_tokens??0)"></div>
                <div class="cmp-sub">
                  <span style="color:var(--green)" x-text="detail.audit.included_count??0"></span> kept ·
                  <span style="color:var(--yellow)" x-text="detail.audit.compressed_count??0"></span> compressed ·
                  <span style="color:var(--red)" x-text="detail.audit.dropped_count??0"></span> dropped
                </div>
              </div>
            </div>
          </div>

          <!-- 2. token savings donut -->
          <div class="card">
            <div class="card-title">Token Savings</div>
            <div class="donut-row">
              <div class="donut-wrap">
                <canvas id="donut-canvas" width="160" height="160"></canvas>
                <div class="donut-center">
                  <div class="dc-pct" x-text="pct(detail.audit.tokens_saved_percent??0)"></div>
                  <div class="dc-lab">saved</div>
                </div>
              </div>
              <div class="donut-legend">
                <div class="dl-item">
                  <div class="dl-dot" style="background:var(--accent)"></div>
                  <div>
                    <div class="dl-val" x-text="fmtK(detail.audit.final_prompt_tokens??0)+' tok'"></div>
                    <div class="dl-sub">sent to the LLM</div>
                  </div>
                </div>
                <div class="dl-item">
                  <div class="dl-dot" style="background:var(--green)"></div>
                  <div>
                    <div class="dl-val" x-text="fmtK(detail.audit.tokens_saved??0)+' tok'"></div>
                    <div class="dl-sub">saved by TokenGate</div>
                  </div>
                </div>
                <template x-if="detail.config">
                  <div class="dl-item">
                    <div class="dl-dot" style="background:var(--border)"></div>
                    <div>
                      <div class="dl-val" style="font-size:14px" x-text="detail.config.strategy??'—'"></div>
                      <div class="dl-sub" x-text="'budget '+fmtK(detail.config.max_prompt_tokens)+' tok'"></div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- 3. pipeline funnel -->
          <div class="card" x-show="detail.audit.stages && detail.audit.stages.length">
            <div class="card-title">Pipeline Drop-off Funnel</div>
            <div :style="`height:${Math.max(200, (detail.audit.stages||[]).length * 54 + 56)}px`">
              <canvas id="funnel-canvas"></canvas>
            </div>
            <div style="margin-top:10px;font-size:12px;color:var(--muted)">
              Bars show % of total input blocks that survived each stage. Hover for token detail.
            </div>
          </div>

          <!-- 4. block decisions -->
          <div class="card" x-show="detail.audit.decisions && detail.audit.decisions.length">
            <div class="card-title">Block Decisions (<span x-text="(detail.audit.decisions||[]).length"></span>)</div>
            <table class="dt">
              <colgroup>
                <col style="width:96px">
                <col style="width:180px">
                <col style="width:90px">
                <col style="width:62px">
                <col style="width:62px">
                <col>
              </colgroup>
              <thead>
                <tr><th>Decision</th><th>Source</th><th>Tokens</th><th>Score</th><th>Rerank</th><th>Reason</th></tr>
              </thead>
              <template x-for="d in (detail.audit.decisions||[])" :key="d.block_id">
                <tbody>
                  <!-- main row -->
                  <tr style="cursor:pointer" @click="d._open=!d._open">
                    <td><span class="chip" :class="d.decision==='included'?'ci':d.decision==='compressed'?'cc':'cd'" x-text="d.decision"></span></td>
                    <td :title="(detail.audit.block_files||{})[d.block_id] || d.block_id">
                      <div style="font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                           x-text="baseName((detail.audit.block_files||{})[d.block_id]) || d.source_id || d.block_id"></div>
                      <div class="muted" style="font-size:10.5px;font-family:ui-monospace,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                           x-text="d.block_id"></div>
                    </td>
                    <td class="mono">
                      <span x-text="d.original_tokens"></span>
                      <template x-if="d.final_tokens!==d.original_tokens"><span class="muted"> → <span x-text="d.final_tokens"></span></span></template>
                    </td>
                    <td class="mono" x-text="d.score!=null?d.score.toFixed(3):'—'"></td>
                    <td class="mono" x-text="d.rerank_score!=null?d.rerank_score.toFixed(3):'—'"></td>
                    <td class="muted wrap" style="font-size:12px" x-text="d.reason"></td>
                  </tr>
                  <!-- expandable content preview -->
                  <tr x-show="d._open && d.content_preview" style="display:none">
                    <td colspan="6" style="padding:0">
                      <div style="margin:0 9px 11px;padding:12px 15px;background:var(--panel);border-radius:9px;
                                  font-size:12.5px;line-height:1.65;font-family:ui-monospace,monospace;white-space:pre-wrap;
                                  color:var(--text);border:1px solid var(--border)"
                           x-text="d.content_preview"></div>
                    </td>
                  </tr>
                </tbody>
              </template>
            </table>
            <div style="margin-top:12px;font-size:12px;color:var(--muted)">Click a row to expand its content preview.</div>
          </div>

          <!-- 5. final prompt -->
          <div class="card" x-show="detail.audit.final_prompt">
            <div class="card-title">Final Prompt sent to LLM</div>
            <div style="font-size:12.5px;line-height:1.7;font-family:ui-monospace,'SF Mono',Menlo,monospace;white-space:pre-wrap;
                        background:var(--panel);padding:16px;border-radius:9px;
                        border:1px solid var(--border);max-height:420px;overflow-y:auto;color:var(--text)"
                 x-text="detail.audit.final_prompt"></div>
          </div>

        </div><!-- /.d-cards -->
      </template>

    </div><!-- /d-col -->
  </div><!-- /columns -->
</div><!-- /app -->

<script>
function dashboard() {
  return {
    theme: localStorage.getItem('tg-theme') || 'light',
    stats: null, sessions: [], queries: [], detail: null,
    activeSession: null, activeQueryId: null,
    loadingSessions: false, loadingQueries: false, loadingDetail: false,
    _donutChart: null, _sessionChart: null,

    async init() {
      document.documentElement.setAttribute('data-theme', this.theme);
      this.loadingSessions = true;
      try {
        const [stats, sessions] = await Promise.all([
          fetch('/api/stats').then(r => r.json()),
          fetch('/api/sessions').then(r => r.json()),
        ]);
        this.stats = stats;
        this.sessions = sessions;
      } finally { this.loadingSessions = false; }
    },

    toggleTheme() {
      this.theme = this.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', this.theme);
      localStorage.setItem('tg-theme', this.theme);
      if (this.detail) this.$nextTick(() => { this._renderDonut(); this._renderFunnel(); });
      if (this.queries.length > 1) this.$nextTick(() => this._renderSessionChart());
    },

    async selectSession(s) {
      if (this.activeSession === s.session_id) return;
      this.activeSession = s.session_id;
      this.queries = []; this.detail = null; this.activeQueryId = null;
      this.loadingQueries = true;
      try {
        this.queries = await fetch(`/api/sessions/${s.session_id}`).then(r => r.json());
        if (this.queries.length > 1) this.$nextTick(() => this._renderSessionChart());
      } finally { this.loadingQueries = false; }
    },

    async selectQuery(q) {
      if (this.activeQueryId === q.query_id) return;
      this.activeQueryId = q.query_id;
      this.detail = null;
      this.loadingDetail = true;
      try {
        this.detail = await fetch(`/api/queries/${q.query_id}`).then(r => r.json());
        this.$nextTick(() => { this._renderDonut(); this._renderFunnel(); });
      } finally { this.loadingDetail = false; }
    },

    // ── helpers ──────────────────────────────────────────────────────
    _css(p) { return getComputedStyle(document.documentElement).getPropertyValue(p).trim(); },

    sessionTitle(s) {
      if (s.label) return s.label;
      if (s.preview) return s.preview.length > 64 ? s.preview.slice(0, 64) + '…' : s.preview;
      return s.session_id;
    },

    // ── donut chart ───────────────────────────────────────────────────
    _renderDonut() {
      if (this._donutChart) { this._donutChart.destroy(); this._donutChart = null; }
      const canvas = document.getElementById('donut-canvas');
      if (!canvas || !this.detail || typeof Chart === 'undefined') return;
      const sent  = this.detail.audit.final_prompt_tokens ?? 0;
      const saved = this.detail.audit.tokens_saved ?? 0;
      this._donutChart = new Chart(canvas, {
        type: 'doughnut',
        data: {
          datasets: [{
            data: [sent, saved],
            backgroundColor: [this._css('--accent'), this._css('--green')],
            borderWidth: 0, hoverOffset: 4,
          }],
        },
        options: {
          cutout: '70%',
          animation: { duration: 500, easing: 'easeOutQuart' },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ctx.dataIndex === 0
                  ? ` ${ctx.raw.toLocaleString()} tok sent to LLM`
                  : ` ${ctx.raw.toLocaleString()} tok saved`,
              },
              backgroundColor: 'rgba(0,0,0,.85)', padding: 10,
            },
          },
        },
      });
    },

    // ── funnel chart (Chart.js horizontal bar — drop-off rates) ─────────────
    _renderFunnel() {
      if (this._funnelChart) { this._funnelChart.destroy(); this._funnelChart = null; }
      const canvas = document.getElementById('funnel-canvas');
      if (!canvas || !this.detail?.audit?.stages?.length || typeof Chart === 'undefined') return;

      const stages  = this.detail.audit.stages;
      const firstIn = stages[0]?.blocks_in || 1;
      const accent  = this._css('--accent');
      const red     = this._css('--red');
      const yellow  = this._css('--yellow');
      const green   = this._css('--green');
      const muted   = this._css('--muted');
      const text    = this._css('--text');
      const self    = this;

      // % of TOTAL input blocks surviving after each stage (absolute funnel)
      const survivalPcts = stages.map(s => +(s.blocks_out / firstIn * 100).toFixed(1));

      // step-level drop rate: how much did THIS stage cut vs its own input
      const stepDropPcts = stages.map((s, i) => {
        const prevOut = i === 0 ? s.blocks_in : stages[i - 1].blocks_out;
        return prevOut > 0 ? Math.round((prevOut - s.blocks_out) / prevOut * 100) : 0;
      });

      // Color the bar by survival rate: green ≥80 · yellow ≥50 · red <50
      const barColors = survivalPcts.map(p =>
        p >= 80 ? accent : p >= 50 ? yellow : red
      );

      this._funnelChart = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: stages.map(s => s.stage.replace(/_/g, ' ')),
          datasets: [{
            data: survivalPcts,
            backgroundColor: barColors,
            borderRadius: 6,
            borderSkipped: false,
            barThickness: 32,
          }],
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 700, easing: 'easeOutExpo' },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                title: ctx => ctx[0].label,
                label: (ctx) => {
                  const s = stages[ctx.dataIndex];
                  const drop = s.dropped;
                  const dropPct = stepDropPcts[ctx.dataIndex];
                  const tokIn = s.tokens_in, tokOut = s.tokens_out;
                  const tokPct = tokIn > 0 ? Math.round(tokOut / tokIn * 100) : 100;
                  return [
                    ` blocks: ${s.blocks_out} / ${s.blocks_in}  (${ctx.raw}% of input)`,
                    drop > 0
                      ? ` dropped: −${drop}  (${dropPct}% cut at this stage)`
                      : ` all blocks passed through`,
                    ` tokens: ${self.fmtK(tokOut)} / ${self.fmtK(tokIn)}  (${tokPct}% retained)`,
                    s.duration_ms > 0 ? ` time: ${s.duration_ms} ms` : '',
                  ].filter(Boolean);
                },
              },
              backgroundColor: 'rgba(0,0,0,.92)',
              padding: { x: 14, y: 11 },
              titleFont: { size: 13, weight: 'bold' },
              bodyFont: { size: 12 },
              displayColors: false,
              boxPadding: 4,
            },
          },
          scales: {
            x: {
              min: 0, max: 100,
              grid: { color: 'rgba(128,128,128,0.12)' },
              ticks: {
                color: muted,
                font: { size: 12 },
                callback: v => v + '%',
                maxTicksLimit: 6,
              },
              border: { display: false },
              title: {
                display: true,
                text: '% of total input blocks surviving',
                color: muted,
                font: { size: 11 },
              },
            },
            y: {
              grid: { display: false },
              ticks: {
                color: text,
                font: { size: 13, family: 'ui-monospace, monospace' },
                padding: 10,
              },
              border: { display: false },
            },
          },
        },
        plugins: [{
          id: 'drop-annotations',
          afterDraw(chart) {
            const ctx2 = chart.ctx;
            const meta = chart.getDatasetMeta(0);
            meta.data.forEach((bar, i) => {
              const s = stages[i];
              if (s.dropped === 0) return;
              const dropPct = stepDropPcts[i];
              ctx2.save();
              ctx2.fillStyle = red;
              ctx2.font = 'bold 11px Inter, system-ui, -apple-system, sans-serif';
              ctx2.textAlign = 'left';
              ctx2.textBaseline = 'middle';
              ctx2.fillText(`−${s.dropped}  (${dropPct}% step drop)`, bar.x + 10, bar.y);
              ctx2.restore();
            });
          },
        }],
      });
    },

    // ── session bar chart ─────────────────────────────────────────────
    _renderSessionChart() {
      if (this._sessionChart) { this._sessionChart.destroy(); this._sessionChart = null; }
      const canvas = document.getElementById('session-chart');
      if (!canvas || this.queries.length < 2 || typeof Chart === 'undefined') return;
      const accent = this._css('--accent');
      const muted  = this._css('--muted');
      this._sessionChart = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: this.queries.map((_, i) => 'Q' + (i + 1)),
          datasets: [{
            data: this.queries.map(q => Math.round(q.saved_pct ?? 0)),
            backgroundColor: accent, borderRadius: 4, borderSkipped: false,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          animation: { duration: 300 },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ` ${ctx.raw}% saved`,
                title: ctx => (this.queries[ctx[0].dataIndex]?.query_text ?? '').slice(0, 50) + '…',
              },
              backgroundColor: 'rgba(0,0,0,.85)', padding: 10,
            },
          },
          scales: {
            x: { grid:{display:false}, ticks:{color:muted,font:{size:10}}, border:{display:false} },
            y: { display:false, min:0, max:100 },
          },
        },
      });
    },

    // ── formatters ───────────────────────────────────────────────────
    pct(v) { return v != null ? Math.round(v) + '%' : '—'; },
    fmtK(n) {
      if (!n) return '0';
      return n >= 1000 ? (n / 1000).toFixed(1) + 'K' : String(Math.round(n));
    },
    fmtTime(ts) {
      if (!ts) return '';
      const d = new Date(ts * 1000);
      return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' })
        + ' · ' + d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
    },
    savedColor(p) { return p>=50?'var(--green)':p>=20?'var(--yellow)':'var(--red)'; },
    savedBadge(p) { return p==null?'bm':p>=50?'bg':p>=20?'by':'br'; },
    baseName(p) { return p ? p.replace(/\\/g,'/').replace(/\/$/, '').split('/').pop() : ''; },
  };
}
</script>
</body>
</html>
